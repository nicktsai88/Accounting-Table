<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>✨ 2026年 各分店營收總表 💇‍♀️</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Nunito', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fff0f6;
            background-image: radial-gradient(#ffe4e6 1px, transparent 1px);
            background-size: 20px 20px;
            -webkit-tap-highlight-color: transparent;
        }
        /* 隱藏數字輸入框的上下箭頭 */
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type="number"] {
            -moz-appearance: textfield;
        }
        
        .glass-panel {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 2px solid #fbcfe8;
        }

        .custom-scrollbar::-webkit-scrollbar {
            height: 12px;
            width: 12px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #fce7f3;
            border-radius: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #f472b6;
            border-radius: 10px;
            border: 3px solid #fce7f3;
        }

        /* 系統狀態與動畫 CSS */
        .status-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 6px; }
        .status-loading { background-color: #fbbf24; animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; box-shadow: 0 0 8px #fbbf24; }
        .status-success { background-color: #34d399; box-shadow: 0 0 8px #34d399; }
        .status-error { background-color: #f87171; box-shadow: 0 0 8px #f87171; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="text-gray-700 min-h-screen">

    <!-- 主程式容器 -->
    <div id="app" class="w-full h-full relative">
        
        <!-- ============================================== -->
        <!-- 登入視窗 (Login View)                          -->
        <!-- ============================================== -->
        <div id="login-view" class="fixed inset-0 z-40 flex items-center justify-center p-6 bg-[#fff0f6] bg-[radial-gradient(#ffe4e6_1px,transparent_1px)] [background-size:20px_20px] transition-opacity duration-300">
            <div class="glass-panel p-8 md:p-12 rounded-[2.5rem] shadow-2xl z-10 w-[40rem] max-w-[95vw] text-center">
                <!-- 右上角連線狀態 -->
                <div class="absolute top-6 right-6 md:top-8 md:right-8">
                    <div class="bg-white/80 px-4 py-2 rounded-full shadow-sm text-sm font-bold text-pink-800 flex items-center border border-pink-200">
                        <span id="login-status-dot" class="status-dot status-loading"></span>
                        <span id="login-status-text">雲端連線中...</span>
                    </div>
                </div>

                <div class="w-24 h-24 bg-gradient-to-br from-pink-300 to-purple-400 rounded-3xl mx-auto mb-6 flex items-center justify-center shadow-lg transform rotate-3">
                    <span class="text-5xl">💇‍♀️</span>
                </div>
                <h1 class="text-3xl md:text-4xl lg:text-5xl font-extrabold text-pink-600 mb-4 tracking-widest drop-shadow-sm">營收紀錄系統</h1>
                <p class="text-pink-400 mb-8 text-lg font-bold bg-pink-50 inline-block px-5 py-2 rounded-full border border-pink-100 shadow-sm">雲端自動同步 ☁️ 支援跨裝置</p>
                
                <div class="space-y-6">
                    <input type="text" id="usernameInput" placeholder="✍️ 請輸入您的姓名或分店代號" class="w-full px-6 py-5 text-xl rounded-2xl border-2 border-pink-200 focus:outline-none focus:border-pink-500 focus:ring-4 focus:ring-pink-200 text-center transition-all bg-white/80 shadow-inner font-bold text-gray-700">
                    <button onclick="handleLogin(document.getElementById('usernameInput').value)" class="w-full bg-gradient-to-r from-pink-400 to-purple-400 hover:from-pink-500 hover:to-purple-500 text-white font-bold py-4 px-6 text-2xl rounded-2xl shadow-lg transform hover:scale-[1.02] transition-all">
                        進入系統 ✨
                    </button>
                </div>
                
                <div class="mt-10 border-t-2 border-pink-100 border-dashed pt-6">
                    <p class="text-base text-pink-400 mb-4 font-bold tracking-wide">☁️ 快速登入 (雲端最近使用者)</p>
                    <div id="recent-users-container" class="flex flex-wrap justify-center gap-3">
                        <span class="text-base text-gray-400 bg-white/50 px-5 py-2.5 rounded-xl border border-pink-100">讀取中...</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- ============================================== -->
        <!-- 儀表板視窗 (Dashboard View - 原本的 UI)        -->
        <!-- ============================================== -->
        <div id="dashboard-view" class="hidden animate-fade-in p-4 md:p-8">
            <div class="max-w-[1600px] mx-auto">
                <!-- 標題與導覽區塊 -->
                <div class="relative mb-8 bg-white/80 rounded-3xl p-6 shadow-sm border-2 border-pink-100 flex flex-col md:flex-row items-center justify-center w-full">
                    
                    <!-- Logo (左上) -->
                    <div class="md:absolute md:left-6 mb-4 md:mb-0">
                        <img src="images/logo.jpg" alt="公司 Logo" class="h-16 md:h-20 w-auto rounded-xl shadow-sm object-contain" onerror="this.onerror=null; this.src='data:image/svg+xml;charset=UTF-8,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22100%22 height=%2260%22 viewBox=%220 0 100 60%22%3E%3Crect width=%22100%22 height=%2260%22 rx=%2210%22 fill=%22%23fbcfe8%22/%3E%3Ctext x=%2250%22 y=%2235%22 font-family=%22sans-serif%22 font-weight=%22bold%22 font-size=%2216%22 text-anchor=%22middle%22 fill=%22%23be185d%22%3ELOGO%3C/text%3E%3C/svg%3E';">
                    </div>
                    
                    <!-- 標題 -->
                    <div class="text-center">
                        <h1 class="text-3xl md:text-4xl font-bold text-pink-500 drop-shadow-sm">
                            💖 2026年 各分店營收總表 💖
                        </h1>
                        <p class="text-pink-400 mt-2 font-semibold">點擊各月份格子來填寫週結帳紀錄 ✍️</p>
                    </div>

                    <!-- 使用者與狀態 (右上) -->
                    <div class="md:absolute md:right-6 mt-4 md:mt-0 flex flex-col items-end gap-2">
                        <div class="bg-pink-50 px-3 py-1.5 rounded-full shadow-inner text-sm font-bold text-pink-800 border border-pink-200 flex items-center">
                            <span id="dash-status-dot" class="status-dot status-loading"></span>
                            <span id="dash-status-text">連線中</span>
                        </div>
                        <div class="flex items-center gap-3 bg-white px-4 py-2 rounded-2xl shadow-sm border border-pink-100">
                            <span class="font-bold text-purple-700">👤 <span id="display-username">管理員</span></span>
                            <div class="w-px h-5 bg-pink-200"></div>
                            <button onclick="logout()" class="text-gray-400 hover:text-pink-500 font-bold transition-colors">登出 🚪</button>
                        </div>
                    </div>
                </div>

                <!-- 主要年度營收總表 (CSS Grid) -->
                <div class="glass-panel rounded-3xl shadow-xl overflow-hidden mb-12">
                    <div class="overflow-x-auto custom-scrollbar p-4">
                        <div class="min-w-[1250px]" style="display: grid; grid-template-columns: 120px repeat(12, minmax(85px, 1fr)) 120px; gap: 4px;">
                            
                            <div class="bg-pink-300 text-white font-bold p-3 rounded-xl flex items-center justify-center text-lg shadow-inner whitespace-nowrap">🏪 分店</div>
                            <script>
                                for(let i=1; i<=12; i++) {
                                    document.write(`<div class="bg-pink-200 text-pink-800 font-bold p-3 rounded-xl flex items-center justify-center text-lg shadow-inner whitespace-nowrap">🌸 ${i}月</div>`);
                                }
                            </script>
                            <div class="bg-purple-300 text-white font-bold p-3 rounded-xl flex items-center justify-center text-lg shadow-inner whitespace-nowrap">💰 合計</div>

                            <div id="grid-body" class="col-span-full" style="display: grid; grid-template-columns: subgrid; gap: 4px;"></div>

                            <div class="bg-pink-400 text-white font-bold p-3 rounded-xl flex items-center justify-center text-lg mt-2 shadow-md whitespace-nowrap">📊 總計</div>
                            <div id="monthly-totals" class="col-span-12" style="display: grid; grid-template-columns: repeat(12, 1fr); gap: 4px; margin-top: 8px;"></div>
                            <div id="grand-total" class="bg-purple-500 text-white font-bold p-3 rounded-xl flex items-center justify-center text-xl mt-2 shadow-md whitespace-nowrap">0</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 彈出式視窗 (週營收紀錄表) -->
        <div id="modal" class="fixed inset-0 bg-pink-900/40 backdrop-blur-sm hidden items-center justify-center z-50 p-4 transition-opacity duration-300">
            <div class="bg-white rounded-[2rem] shadow-2xl w-full max-w-5xl overflow-hidden border-4 border-pink-200 transform transition-all scale-95" id="modal-content">
                <div class="bg-gradient-to-r from-pink-300 via-purple-300 to-indigo-300 p-5 flex justify-between items-center">
                    <h2 class="text-2xl font-bold text-white drop-shadow-md flex items-center gap-2">
                        <span id="modal-title-emoji">🏬</span>
                        <span id="modal-title">分店 - 月份 營收紀錄表</span>
                    </h2>
                    <button onclick="closeModal()" class="text-white hover:text-pink-100 bg-white/20 hover:bg-white/40 rounded-full w-10 h-10 flex items-center justify-center transition-colors text-xl">❌</button>
                </div>

                <div class="p-6 bg-pink-50/50">
                    <div class="overflow-x-auto custom-scrollbar pb-4">
                        <div class="min-w-[900px]">
                            <div class="grid grid-cols-[60px_140px_1fr_1fr_1fr_1fr_120px_120px_120px] gap-2 mb-3 bg-pink-100 p-3 rounded-2xl font-bold text-pink-800 text-center items-center shadow-sm">
                                <div>序號</div>
                                <div>📅 日期</div>
                                <div>💵 紙鈔</div>
                                <div>🪙 零錢</div>
                                <div>💳 信用卡</div>
                                <div>📱 Line Pay</div>
                                <div class="text-purple-700">🧾 實際營收小計</div>
                                <div class="text-blue-700">📝 結帳單金額</div>
                                <div>⚖️ 正負差額</div>
                            </div>
                            <div id="modal-rows" class="space-y-2"></div>
                            <div class="grid grid-cols-[60px_140px_1fr_1fr_1fr_1fr_120px_120px_120px] gap-2 mt-4 bg-pink-200/80 p-3 rounded-2xl font-bold text-lg items-center text-center shadow-md border-2 border-pink-300">
                                <div class="col-span-6 text-right pr-4 text-pink-900">✨ 營收合計 ✨</div>
                                <div id="modal-total-actual" class="text-purple-800 bg-white/60 rounded-lg p-1">0</div>
                                <div class="text-right pr-4 text-pink-900">差額合計</div>
                                <div id="modal-total-diff" class="bg-white/60 rounded-lg p-1">0</div>
                            </div>
                        </div>
                    </div>

                    <div class="mt-8 flex justify-end gap-4">
                        <button onclick="closeModal()" class="px-6 py-3 rounded-xl font-bold text-pink-500 bg-pink-100 hover:bg-pink-200 transition-colors">稍後再填 🏃</button>
                        <button onclick="saveModalData()" class="px-8 py-3 rounded-xl font-bold text-white bg-gradient-to-r from-pink-400 to-purple-400 hover:from-pink-500 hover:to-purple-500 shadow-lg transform hover:scale-105 transition-all">
                            💾 儲存並更新總表
                        </button>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <!-- ============================================== -->
    <!-- 核心邏輯模組 (Firebase + Local Storage)        -->
    <!-- ============================================== -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // === 基本常數 ===
        const branches = [
            '陽明店', '大昌店', '建興店', '後昌店', '左營店', '明誠店', '華榮店', 
            '光遠店', '大社店', '內惟店', '一心店', '五甲店', '瑞隆店', '德惠店', 
            '自由店', '福山店', '大寮店', '復興店', '鼎中店', '十全店', '華夏店', 
            '武廟店', '小港店', '斗六1店', '斗六2店', '虎尾店', '草屯店'
        ];
        const COLLECTION_NAME = 'Salon-Revenue-App-v1';
        const DOC_GLOBAL = 'Global_Users_Salon';
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'salon-app-default';

        // === 全域變數 ===
        let app, auth, db;
        let isFirebaseInitialized = false;
        let currentUser = null;
        let username = '';
        let connectionStatus = 'loading'; // loading, success, error
        let recentUsers = [];
        let unsubscribeUser = null;
        let unsubscribeGlobal = null;
        
        // 核心資料結構: userData 內包含原本的 appData 與登入歷史
        let userData = { appData: {}, loginHistory: [] };
        
        // UI 狀態
        let currentBranch = '';
        let currentMonth = 0;

        // === UI 工具 ===
        const el = id => document.getElementById(id);
        const formatMoney = num => Number(num).toLocaleString('zh-TW');
        
        // 更新燈號 UI
        const updateStatusUI = () => {
            const loginDot = el('login-status-dot');
            const loginText = el('login-status-text');
            const dashDot = el('dash-status-dot');
            const dashText = el('dash-status-text');

            const applyStatus = (dot, textEl) => {
                if(!dot || !textEl) return;
                dot.className = `status-dot ${connectionStatus === 'loading' ? 'status-loading' : connectionStatus === 'success' ? 'status-success' : 'status-error'}`;
                textEl.innerText = connectionStatus === 'loading' ? '雲端連線中...' : connectionStatus === 'success' ? '雲端已同步 ✨' : '連線失敗 ❌';
            };

            applyStatus(loginDot, loginText);
            applyStatus(dashDot, dashText);
        };

        // === 音效系統 (解決 iOS 限制) ===
        let audioCtx = null;
        const initAudio = () => {
            if (!audioCtx) {
                try {
                    const AudioContext = window.AudioContext || window.webkitAudioContext;
                    audioCtx = new AudioContext();
                } catch(e) { console.warn("AudioContext unsupported"); }
            }
        };
        const playTone = (freq, type, duration) => {
            initAudio();
            if(!audioCtx) return;
            try {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.type = type;
                oscillator.frequency.setValueAtTime(freq, audioCtx.currentTime);
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration);
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + duration);
            } catch(e) {}
        };
        const playSaveSound = () => { playTone(800, 'sine', 0.1); setTimeout(() => playTone(1200, 'sine', 0.15), 100); };

        // === Firebase 初始化 ===
        const initFirebase = async () => {
            try {
                const actualConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : { apiKey: "fake-key-for-local" };
                if (actualConfig.apiKey && actualConfig.apiKey !== "fake-key-for-local") {
                    app = initializeApp(actualConfig);
                    auth = getAuth(app);
                    db = getFirestore(app);
                    isFirebaseInitialized = true;
                    connectionStatus = 'success';
                } else { throw new Error("No config"); }
            } catch (error) { 
                connectionStatus = 'error'; 
                console.warn("運行於本地離線模式");
            }
            updateStatusUI();
        };

        // === 本地與雲端資料處理 ===
        const loadLocalData = (name) => {
            try {
                const local = localStorage.getItem(`${COLLECTION_NAME}_${name}_data`);
                if (local) {
                    userData = Object.assign({ appData: {}, loginHistory: [] }, JSON.parse(local));
                }
            } catch(e) {}
        };

        const saveLocalData = (name) => {
            try { if (name) localStorage.setItem(`${COLLECTION_NAME}_${name}_data`, JSON.stringify(userData)); } catch(e) {}
        };

        const saveUserDataToCloud = async () => {
            saveLocalData(username);
            if (!isFirebaseInitialized || !currentUser || !username) return;
            connectionStatus = 'loading'; updateStatusUI();
            try {
                const userRef = doc(db, 'artifacts', appId, 'public', 'data', `${COLLECTION_NAME}_profiles`, username);
                await setDoc(userRef, userData, { merge: true });
                connectionStatus = 'success';
            } catch(e) {
                console.error("Firebase save error:", e);
                connectionStatus = 'error';
            }
            updateStatusUI();
        };

        // === 監聽雲端資料 ===
        const listenToGlobalUsers = () => {
            if (!isFirebaseInitialized || !currentUser) return;
            const globalRef = doc(db, 'artifacts', appId, 'public', 'data', DOC_GLOBAL, COLLECTION_NAME);
            if(unsubscribeGlobal) unsubscribeGlobal();
            unsubscribeGlobal = onSnapshot(globalRef, (snap) => {
                if(snap.exists()) recentUsers = snap.data().users || [];
                else recentUsers = [];
                renderRecentUsers();
            }, (err) => { connectionStatus = 'error'; updateStatusUI(); });
        };

        const listenToUserDocument = (name) => {
            if (!isFirebaseInitialized || !currentUser) {
                loadLocalData(name);
                renderMainGrid();
                return;
            }
            const userRef = doc(db, 'artifacts', appId, 'public', 'data', `${COLLECTION_NAME}_profiles`, name);
            if(unsubscribeUser) unsubscribeUser();
            
            connectionStatus = 'loading'; updateStatusUI();
            unsubscribeUser = onSnapshot(userRef, (docSnap) => {
                if (docSnap.exists()) {
                    userData = Object.assign({ appData: {}, loginHistory: [] }, docSnap.data());
                    saveLocalData(name);
                } else {
                    userData = { appData: {}, loginHistory: [new Date().toISOString()] };
                    setDoc(userRef, userData, { merge: true });
                }
                connectionStatus = 'success'; updateStatusUI();
                renderMainGrid(); // 資料更新後重繪主表
            }, (error) => {
                console.error("Listen user error", error);
                connectionStatus = 'error'; updateStatusUI();
            });
        };

        // === 登入 / 登出邏輯 ===
        window.handleLogin = async (name) => {
            initAudio(); // 啟用音效
            if(!name.trim()) {
                const inputEl = el('usernameInput');
                inputEl.classList.add('border-red-500', 'bg-red-50');
                inputEl.placeholder = "請輸入名稱才能進入！";
                setTimeout(() => {
                    inputEl.classList.remove('border-red-500', 'bg-red-50');
                    inputEl.placeholder = "✍️ 請輸入您的姓名或分店代號";
                }, 2000);
                return;
            }
            
            username = name;
            localStorage.setItem(`${COLLECTION_NAME}_last_user`, username);
            el('display-username').innerText = username;
            
            if (isFirebaseInitialized && currentUser) {
                connectionStatus = 'loading'; updateStatusUI();
                const now = new Date().toISOString();
                const userRef = doc(db, 'artifacts', appId, 'public', 'data', `${COLLECTION_NAME}_profiles`, username);
                try {
                    const snap = await getDoc(userRef);
                    if (snap.exists()) {
                        userData = Object.assign({ appData: {}, loginHistory: [] }, snap.data());
                    } else loadLocalData(username);
                    
                    if (!userData.loginHistory) userData.loginHistory = [];
                    userData.loginHistory.push(now);
                    if (userData.loginHistory.length > 30) userData.loginHistory = userData.loginHistory.slice(-30);
                    
                    await setDoc(userRef, userData, { merge: true });
                    
                    // 更新全域使用者列表
                    const globalRef = doc(db, 'artifacts', appId, 'public', 'data', DOC_GLOBAL, COLLECTION_NAME);
                    const gSnap = await getDoc(globalRef);
                    let users = gSnap.exists() ? gSnap.data().users || [] : [];
                    users = users.filter(u => u.name !== username);
                    users.push({ name: username, lastLogin: now });
                    if(users.length > 10) users = users.slice(-10);
                    await setDoc(globalRef, { users }, { merge: true });
                    
                    connectionStatus = 'success';
                } catch(e) { 
                    console.error("Login data sync error:", e); 
                    connectionStatus = 'error';
                }
                updateStatusUI();
                listenToUserDocument(username);
            } else {
                loadLocalData(username);
                if (!userData.loginHistory) userData.loginHistory = [];
                userData.loginHistory.push(new Date().toISOString());
                saveLocalData(username);
            }
            
            // 切換畫面
            el('login-view').classList.add('hidden');
            el('dashboard-view').classList.remove('hidden');
            renderMainGrid();
        };

        window.logout = () => {
            if(confirm("確定要登出嗎？")) {
                username = '';
                userData = { appData: {}, loginHistory: [] };
                localStorage.removeItem(`${COLLECTION_NAME}_last_user`);
                if(unsubscribeUser) unsubscribeUser();
                
                el('login-view').classList.remove('hidden');
                el('dashboard-view').classList.add('hidden');
                el('usernameInput').value = '';
                renderRecentUsers();
            }
        };

        const renderRecentUsers = () => {
            const container = el('recent-users-container');
            if(recentUsers.length > 0) {
                container.innerHTML = recentUsers.slice().reverse().slice(0, 8).map(u => 
                    `<button onclick="handleLogin('${u.name}')" class="text-base font-bold bg-white/80 border-2 border-pink-200 text-pink-700 hover:bg-pink-100 hover:border-pink-400 px-5 py-2.5 rounded-xl shadow-sm transition-all transform hover:-translate-y-1">${u.name}</button>`
                ).join('');
            } else {
                container.innerHTML = `<span class="text-base text-pink-300 font-bold bg-white/50 px-5 py-2.5 rounded-xl">尚無雲端紀錄</span>`;
            }
        };

        // === 應用程式啟動 ===
        const bootApp = async () => {
            await initFirebase();
            const lastUser = localStorage.getItem(`${COLLECTION_NAME}_last_user`);
            
            if (isFirebaseInitialized) {
                try {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) await signInWithCustomToken(auth, __initial_auth_token);
                    else await signInAnonymously(auth);
                } catch(e) { connectionStatus = 'error'; updateStatusUI(); }

                onAuthStateChanged(auth, async (user) => {
                    if (user) {
                        currentUser = user;
                        listenToGlobalUsers();
                        if (lastUser) {
                            username = lastUser;
                            el('display-username').innerText = username;
                            listenToUserDocument(username);
                            el('login-view').classList.add('hidden');
                            el('dashboard-view').classList.remove('hidden');
                        } else renderRecentUsers();
                    }
                });
            } else {
                if (lastUser) {
                    username = lastUser;
                    el('display-username').innerText = username;
                    loadLocalData(username);
                    el('login-view').classList.add('hidden');
                    el('dashboard-view').classList.remove('hidden');
                    renderMainGrid();
                } else renderRecentUsers();
            }
        };

        // ==============================================
        // 原有業務邏輯 (綁定到 window 供 HTML 呼叫)
        // ==============================================

        window.getMonthTotalForBranch = (branch, month) => {
            if (!userData.appData[branch] || !userData.appData[branch][month]) return 0;
            let total = 0;
            userData.appData[branch][month].forEach(row => {
                const sub = (Number(row.notes) || 0) + (Number(row.coins) || 0) + 
                            (Number(row.cc) || 0) + (Number(row.line) || 0);
                total += sub;
            });
            return total;
        };

        window.renderMainGrid = () => {
            const gridBody = el('grid-body');
            const monthlyTotalsContainer = el('monthly-totals');
            if(!gridBody || !monthlyTotalsContainer) return;

            gridBody.innerHTML = '';
            monthlyTotalsContainer.innerHTML = '';

            let grandTotal = 0;
            let monthlyTotals = new Array(12).fill(0);

            branches.forEach(branch => {
                let branchYearTotal = 0;
                gridBody.innerHTML += `<div class="bg-white font-bold p-3 rounded-xl flex items-center justify-center text-pink-700 shadow-sm border border-pink-100 whitespace-nowrap">${branch}</div>`;

                for (let m = 1; m <= 12; m++) {
                    const monthVal = getMonthTotalForBranch(branch, m);
                    branchYearTotal += monthVal;
                    monthlyTotals[m-1] += monthVal;

                    gridBody.innerHTML += `
                        <div onclick="openModal('${branch}', ${m})" 
                             class="bg-white p-3 rounded-xl flex items-center justify-end text-gray-600 shadow-sm border border-transparent hover:border-pink-300 hover:shadow-md cursor-pointer transition-all hover:-translate-y-1 group relative whitespace-nowrap">
                            ${monthVal > 0 ? formatMoney(monthVal) : '<span class="text-gray-300">-</span>'}
                            <div class="absolute inset-0 bg-pink-100/50 opacity-0 group-hover:opacity-100 rounded-xl transition-opacity pointer-events-none"></div>
                        </div>
                    `;
                }
                gridBody.innerHTML += `<div class="bg-purple-50 font-bold p-3 rounded-xl flex items-center justify-end text-purple-700 shadow-sm border border-purple-100 whitespace-nowrap">${formatMoney(branchYearTotal)}</div>`;
                grandTotal += branchYearTotal;
            });

            monthlyTotals.forEach(total => {
                monthlyTotalsContainer.innerHTML += `<div class="bg-pink-100 font-bold p-3 rounded-xl flex items-center justify-end text-pink-800 shadow-sm border border-pink-200 whitespace-nowrap">${formatMoney(total)}</div>`;
            });
            el('grand-total').innerText = formatMoney(grandTotal);
        };

        window.createNumberInput = (className, value, placeholder) => `
            <div>
                <input type="number" placeholder="${placeholder}" class="${className} w-full p-2 rounded-xl border border-pink-200 focus:border-pink-500 focus:ring-2 focus:ring-pink-200 outline-none text-right shadow-inner text-gray-700 transition-all placeholder:text-gray-300" value="${value || ''}">
            </div>
        `;

        window.openModal = (branch, month) => {
            currentBranch = branch;
            currentMonth = month;
            el('modal-title').innerText = `${branch} - ${month}月 營收紀錄表`;
            const modalRows = el('modal-rows');
            modalRows.innerHTML = '';

            let monthData = (userData.appData[branch] && userData.appData[branch][month]) ? userData.appData[branch][month] : [];
            
            for (let i = 0; i < 6; i++) {
                const row = monthData[i] || { date: '', notes: '', coins: '', cc: '', line: '', receipt: '' };
                modalRows.innerHTML += `
                    <div class="grid grid-cols-[60px_140px_1fr_1fr_1fr_1fr_120px_120px_120px] gap-2 items-center row-entry group hover:bg-pink-50 p-1 rounded-xl transition-colors">
                        <div class="text-center font-bold text-pink-400 bg-white rounded-lg py-2 shadow-sm border border-pink-100">${i + 1}</div>
                        <div><input type="date" class="row-date w-full p-2 rounded-xl border border-pink-200 focus:border-pink-500 focus:ring-2 focus:ring-pink-200 outline-none text-sm text-gray-600 shadow-inner" value="${row.date}"></div>
                        ${createNumberInput('row-notes', row.notes, '紙鈔')}
                        ${createNumberInput('row-coins', row.coins, '零錢')}
                        ${createNumberInput('row-cc', row.cc, '信用卡')}
                        ${createNumberInput('row-line', row.line, 'LinePay')}
                        <div class="row-subtotal text-right font-bold text-purple-600 bg-purple-50 p-2 rounded-xl shadow-inner border border-purple-100">0</div>
                        ${createNumberInput('row-receipt', row.receipt, '結帳單')}
                        <div class="row-diff text-right font-bold p-2 rounded-xl shadow-inner border border-gray-100 bg-gray-50">0</div>
                    </div>
                `;
            }

            document.querySelectorAll('.row-entry input[type="number"]').forEach(input => {
                input.addEventListener('input', calculateModalTotals);
            });

            const modal = el('modal');
            const modalContent = el('modal-content');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            setTimeout(() => {
                modalContent.classList.remove('scale-95');
                modalContent.classList.add('scale-100');
            }, 10);
            calculateModalTotals();
        };

        window.closeModal = () => {
            const modal = el('modal');
            const modalContent = el('modal-content');
            modalContent.classList.remove('scale-100');
            modalContent.classList.add('scale-95');
            setTimeout(() => {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
            }, 200);
        };

        window.calculateModalTotals = () => {
            let totalActual = 0, totalDiff = 0;
            document.querySelectorAll('.row-entry').forEach(row => {
                const notes = Number(row.querySelector('.row-notes').value) || 0;
                const coins = Number(row.querySelector('.row-coins').value) || 0;
                const cc = Number(row.querySelector('.row-cc').value) || 0;
                const line = Number(row.querySelector('.row-line').value) || 0;
                const receipt = Number(row.querySelector('.row-receipt').value) || 0;

                const subtotal = notes + coins + cc + line;
                row.querySelector('.row-subtotal').innerText = formatMoney(subtotal);

                let diff = 0;
                let diffElement = row.querySelector('.row-diff');
                
                if (subtotal !== 0 || row.querySelector('.row-receipt').value !== '') {
                    diff = subtotal - receipt;
                    diffElement.innerText = formatMoney(diff);
                    if (diff < 0) diffElement.className = 'row-diff text-right font-bold p-2 rounded-xl shadow-inner border border-red-200 bg-red-50 text-red-500';
                    else if (diff > 0) diffElement.className = 'row-diff text-right font-bold p-2 rounded-xl shadow-inner border border-green-200 bg-green-50 text-green-600';
                    else diffElement.className = 'row-diff text-right font-bold p-2 rounded-xl shadow-inner border border-gray-100 bg-gray-50 text-gray-700';
                } else {
                    diffElement.innerText = '';
                    diffElement.className = 'row-diff text-right font-bold p-2 rounded-xl shadow-inner border border-gray-100 bg-gray-50';
                }
                totalActual += subtotal;
                totalDiff += diff;
            });

            el('modal-total-actual').innerText = formatMoney(totalActual);
            const totalDiffEl = el('modal-total-diff');
            totalDiffEl.innerText = formatMoney(totalDiff);
            if (totalDiff < 0) totalDiffEl.className = 'bg-white/90 rounded-lg p-1 text-red-600 border border-red-300';
            else if (totalDiff > 0) totalDiffEl.className = 'bg-white/90 rounded-lg p-1 text-green-600 border border-green-300';
            else totalDiffEl.className = 'bg-white/60 rounded-lg p-1 text-gray-700';
        };

        window.saveModalData = () => {
            if (!userData.appData[currentBranch]) userData.appData[currentBranch] = {};
            const monthData = [];
            document.querySelectorAll('.row-entry').forEach(row => {
                monthData.push({
                    date: row.querySelector('.row-date').value,
                    notes: row.querySelector('.row-notes').value,
                    coins: row.querySelector('.row-coins').value,
                    cc: row.querySelector('.row-cc').value,
                    line: row.querySelector('.row-line').value,
                    receipt: row.querySelector('.row-receipt').value,
                });
            });

            userData.appData[currentBranch][currentMonth] = monthData;
            playSaveSound();
            saveUserDataToCloud();
            closeModal();
            renderMainGrid(); 
        };

        // Modal 背景點擊關閉
        el('modal').addEventListener('click', function(e) { if (e.target === this) closeModal(); });

        // 啟動 App
        bootApp();

    </script>
</body>
</html>
