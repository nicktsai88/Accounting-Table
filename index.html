<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>✨ 2026年 囍事快剪營收紀錄系統 💇‍♀️</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Nunito', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fff0f6;
            background-image: radial-gradient(#ffe4e6 1px, transparent 1px);
            background-size: 20px 20px;
            -webkit-tap-highlight-color: transparent;
            color: #4c1d95;
        }
        /* 隱藏數字輸入框的上下箭頭 */
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type="number"] {
            -moz-appearance: textfield;
        }
        
        .glass-panel {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 2px solid #fbcfe8;
        }

        .custom-scrollbar::-webkit-scrollbar {
            height: 12px;
            width: 12px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #fce7f3;
            border-radius: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #f472b6;
            border-radius: 10px;
            border: 3px solid #fce7f3;
        }
        
        /* 系統狀態燈號與動畫 */
        .status-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 6px; }
        .status-loading { background-color: #fbbf24; animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; box-shadow: 0 0 8px #fbbf24; }
        .status-success { background-color: #34d399; box-shadow: 0 0 8px #34d399; }
        .status-error { background-color: #f87171; box-shadow: 0 0 8px #f87171; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="h-screen w-full flex flex-col overflow-hidden">

    <div id="app" class="w-full h-full flex flex-col overflow-hidden"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // ==========================================
        //  Firebase Configuration & Constants
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyAxQFt76ZPXE7d0i1XeNZ1yiiD2WYNIfHs", 
            authDomain: "chinese-learning-47f4d.firebaseapp.com",
            projectId: "chinese-learning-47f4d",
            storageBucket: "chinese-learning-47f4d.firebasestorage.app",
            messagingSenderId: "76289812052",
            appId: "1:76289812052:web:898384a916f9f341f62fc1"
        };

        const appId = typeof __app_id !== 'undefined' ? __app_id : 'hair-salon-app-default';
        const COLLECTION_NAME = 'Accounting-Table'; // 已變更名稱
        const DOC_GLOBAL = 'Global_Users_AccountingTable';      
        
        let app, auth, db;
        let isFirebaseInitialized = false;
        let currentUser = null;
        let username = '';
        
        // 資料結構
        let userData = { revenueData: {}, loginHistory: [] }; 
        let connectionStatus = 'loading';
        let recentUsers = [];
        let unsubscribeUser = null;
        let unsubscribeGlobal = null;
        let currentTab = 'login';
        
        // 營收資料狀態 (關聯至 userData.revenueData)
        let appData = {};
        let currentBranch = '';
        let currentMonth = 0;

        const branches = [
            '陽明店', '大昌店', '建興店', '後昌店', '左營店', '明誠店', '華榮店', 
            '光遠店', '大社店', '內惟店', '一心店', '五甲店', '瑞隆店', '德惠店', 
            '自由店', '福山店', '大寮店', '復興店', '鼎中店', '十全店', '華夏店', 
            '武廟店', '小港店', '斗六1店', '斗六2店', '虎尾店', '草屯店'
        ];

        // ==========================================
        //  Firebase Initialization
        // ==========================================
        try {
            const actualConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : firebaseConfig;
            if (actualConfig.apiKey && actualConfig.apiKey !== "填入key" && actualConfig.apiKey !== "YOUR_API_KEY") {
                app = initializeApp(actualConfig);
                auth = getAuth(app);
                db = getFirestore(app);
                isFirebaseInitialized = true;
                connectionStatus = 'success';
            } else { connectionStatus = 'error'; }
        } catch (error) { connectionStatus = 'error'; }

        const initAuth = async () => {
            if (!isFirebaseInitialized) return;
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) await signInWithCustomToken(auth, __initial_auth_token);
                else await signInAnonymously(auth);
            } catch (error) { connectionStatus = 'error'; }
        };

        const el = id => document.getElementById(id);

        // ==========================================
        //  Data Sync & Listeners (核心邏輯不變)
        // ==========================================
        const listenToGlobalUsers = () => {
            if (!isFirebaseInitialized || !currentUser) return;
            const globalRef = doc(db, 'artifacts', appId, 'public', 'data', DOC_GLOBAL, COLLECTION_NAME);
            if(unsubscribeGlobal) unsubscribeGlobal();
            unsubscribeGlobal = onSnapshot(globalRef, (snap) => {
                if(snap.exists()) recentUsers = snap.data().users || [];
                else recentUsers = [];
                if(currentTab === 'login') renderLogin();
            });
        };

        const listenToUserDocument = (name) => {
            if (!isFirebaseInitialized || !currentUser) {
                loadLocalData(name);
                return;
            }
            const userRef = doc(db, 'artifacts', appId, 'public', 'data', `${COLLECTION_NAME}_profiles`, name);
            if(unsubscribeUser) unsubscribeUser();
            unsubscribeUser = onSnapshot(userRef, (docSnap) => {
                if (docSnap.exists()) {
                    userData = Object.assign({ revenueData: {}, loginHistory: [] }, docSnap.data());
                    appData = userData.revenueData || {};
                    saveLocalData(name);
                } else {
                    userData = { revenueData: {}, loginHistory: [new Date().toISOString()] };
                    appData = {};
                    setDoc(userRef, userData, { merge: true });
                }
                
                // Refresh UI if in main view
                if(currentTab === 'main') renderMainGrid();
            }, (error) => console.error("Listen user error", error));
        };

        const saveUserDataToCloud = async () => {
            userData.revenueData = appData;
            saveLocalData(username);
            if (!isFirebaseInitialized || !currentUser || !username) return;
            const userRef = doc(db, 'artifacts', appId, 'public', 'data', `${COLLECTION_NAME}_profiles`, username);
            try { await setDoc(userRef, userData, { merge: true }); } catch(e) { console.error("Firebase save error:", e); }
        };

        const loadLocalData = (name) => {
            try {
                const localData = localStorage.getItem(`${COLLECTION_NAME}_${name}_data`);
                if (localData) {
                    userData = Object.assign({ revenueData: {}, loginHistory: [] }, JSON.parse(localData));
                    appData = userData.revenueData || {};
                }
            } catch(e) {}
        };

        const saveLocalData = (name) => {
            try { if (name) localStorage.setItem(`${COLLECTION_NAME}_${name}_data`, JSON.stringify(userData)); } catch(e) {}
        };

        // ==========================================
        //  App Initialization & Auth Flow
        // ==========================================
        const initApp = async () => {
            renderApp();
            const lastUser = localStorage.getItem(`${COLLECTION_NAME}_last_user`);
            if (isFirebaseInitialized) {
                await initAuth(); 
                onAuthStateChanged(auth, async (user) => {
                    if (user) {
                        currentUser = user;
                        listenToGlobalUsers();
                        if (lastUser) {
                            username = lastUser;
                            setTimeout(() => listenToUserDocument(username), 200);
                            currentTab = 'main';
                            renderMain();
                        } else renderLogin();
                    } else renderLogin();
                });
            } else {
                if (lastUser) {
                    username = lastUser;
                    loadLocalData(username);
                    currentTab = 'main';
                    renderMain();
                } else renderLogin();
            }
        };

        window.handleLogin = async (name) => {
            if(!name.trim()) {
                const inputEl = document.getElementById('usernameInput');
                inputEl.classList.add('border-red-500', 'bg-red-50');
                inputEl.placeholder = "名稱不能為空！";
                setTimeout(() => {
                    inputEl.classList.remove('border-red-500', 'bg-red-50');
                    inputEl.placeholder = "✍️ 請輸入登入名稱";
                }, 2000);
                return;
            }
            username = name;
            localStorage.setItem(`${COLLECTION_NAME}_last_user`, username);
            
            if (isFirebaseInitialized && currentUser) {
                const now = new Date().toISOString();
                const userRef = doc(db, 'artifacts', appId, 'public', 'data', `${COLLECTION_NAME}_profiles`, username);
                try {
                    const snap = await getDoc(userRef);
                    if (snap.exists()) {
                        userData = Object.assign({ revenueData: {}, loginHistory: [] }, snap.data());
                        appData = userData.revenueData || {};
                    } else loadLocalData(username);
                    
                    if (!userData.loginHistory) userData.loginHistory = [];
                    userData.loginHistory.push(now);
                    if (userData.loginHistory.length > 50) userData.loginHistory = userData.loginHistory.slice(-50);
                    
                    await setDoc(userRef, userData, { merge: true });
                    
                    // Update global recent users
                    const globalRef = doc(db, 'artifacts', appId, 'public', 'data', DOC_GLOBAL, COLLECTION_NAME);
                    const gSnap = await getDoc(globalRef);
                    let users = gSnap.exists() ? gSnap.data().users || [] : [];
                    users = users.filter(u => u.name !== username);
                    users.push({ name: username, lastLogin: now });
                    if(users.length > 10) users = users.slice(-10);
                    await setDoc(globalRef, { users }, { merge: true });
                } catch(e) { console.error("Login data sync error:", e); }
                listenToUserDocument(username);
            } else {
                loadLocalData(username);
                if (!userData.loginHistory) userData.loginHistory = [];
                userData.loginHistory.push(new Date().toISOString());
                saveLocalData(username);
            }
            currentTab = 'main';
            renderMain();
        };

        window.logout = () => {
            username = '';
            userData = { revenueData: {}, loginHistory: [] };
            appData = {};
            localStorage.removeItem(`${COLLECTION_NAME}_last_user`);
            if(unsubscribeUser) unsubscribeUser();
            renderLogin();
        };

        window.deleteUserData = async () => {
            if(!confirm(`確定要從雲端刪除 ${username} 的所有報表資料？此操作無法復原！`)) return;
            try {
                if (isFirebaseInitialized && currentUser) {
                    const globalRef = doc(db, 'artifacts', appId, 'public', 'data', DOC_GLOBAL, COLLECTION_NAME);
                    const snap = await getDoc(globalRef);
                    if(snap.exists()) {
                        let users = snap.data().users || [];
                        users = users.filter(u => u.name !== username);
                        await setDoc(globalRef, { users }, { merge: true });
                    }
                    const userRef = doc(db, 'artifacts', appId, 'public', 'data', `${COLLECTION_NAME}_profiles`, username);
                    await setDoc(userRef, { revenueData: {}, loginHistory: [] }, { merge: true });
                }
                localStorage.removeItem(`${COLLECTION_NAME}_last_user`);
                localStorage.removeItem(`${COLLECTION_NAME}_${username}_data`);
                userData = { revenueData: {}, loginHistory: [] };
                appData = {};
                if(unsubscribeUser) unsubscribeUser();
                username = '';
                renderLogin();
            } catch(e) { alert("刪除失敗，請稍後再試"); }
        };

        // ==========================================
        //  Views Rendering
        // ==========================================
        const renderApp = () => { el('app').innerHTML = `<div id="view-container" class="w-full h-full flex flex-col relative"></div>`; };

        window.renderLogin = () => {
            currentTab = 'login';
            el('view-container').innerHTML = `
                <div class="flex-1 flex flex-col items-center justify-center p-6 relative animate-fade-in z-10 overflow-y-auto">
                    <!-- 連線狀態 -->
                    <div class="absolute top-6 right-6 z-20">
                        <div class="glass-panel px-4 py-2 rounded-full shadow-sm text-sm font-bold text-pink-800 flex items-center">
                            <span class="status-dot ${connectionStatus === 'loading' ? 'status-loading' : connectionStatus === 'success' ? 'status-success' : 'status-error'}"></span>
                            ${connectionStatus === 'loading' ? '雲端讀取中... ⏳' : connectionStatus === 'success' ? '雲端已同步 ☁️✨' : '雲端連線失敗 ❌'}
                        </div>
                    </div>
                    
                    <div class="glass-panel p-8 md:p-12 rounded-[2rem] shadow-2xl z-10 w-[32rem] max-w-[95vw] text-center border-4 border-pink-200">
                        <div class="w-24 h-24 bg-pink-100 rounded-[2rem] mx-auto mb-6 flex items-center justify-center shadow-inner border border-pink-300 transform -rotate-3">
                            <span class="text-6xl text-white drop-shadow-sm">💇‍♀️</span>
                        </div>
                        <h1 class="text-3xl md:text-4xl font-extrabold text-pink-600 mb-2 drop-shadow-sm">囍事快剪</h1>
                        <h2 class="text-2xl font-bold text-pink-400 mb-8 tracking-wider">營收紀錄系統</h2>
                        
                        <div class="space-y-5">
                            <input type="text" id="usernameInput" placeholder="✍️ 請輸入登入名稱" class="w-full px-6 py-4 text-xl rounded-xl border-2 border-pink-200 focus:outline-none focus:border-pink-500 focus:ring-4 focus:ring-pink-500/20 text-center transition-all bg-white shadow-inner">
                            <button onclick="handleLogin(document.getElementById('usernameInput').value)" class="w-full bg-gradient-to-r from-pink-400 to-pink-500 hover:from-pink-500 hover:to-pink-600 text-white font-bold py-4 px-6 text-xl rounded-xl shadow-lg transition-all transform hover:scale-105">
                                進入系統 🚀
                            </button>
                        </div>
                        
                        <div class="mt-8 pt-6 border-t-2 border-pink-100 border-dashed">
                            <p class="text-sm text-pink-400 mb-4 font-bold">☁️ 雲端最近登入紀錄</p>
                            <div class="flex flex-wrap justify-center gap-2">
                                ${recentUsers.length > 0 ? recentUsers.slice().reverse().slice(0, 6).map(u => `<button onclick="handleLogin('${u.name}')" class="text-sm font-bold bg-white border border-pink-200 text-pink-600 hover:bg-pink-100 hover:border-pink-300 px-4 py-2 rounded-lg shadow-sm transition-all">${u.name}</button>`).join('') : `<span class="text-sm text-pink-300">尚無紀錄</span>`}
                            </div>
                        </div>
                    </div>
                </div>
            `;
        };

        window.renderMain = () => {
            // 動態產生 1~12 月表頭
            let monthHeaders = '';
            for(let i=1; i<=12; i++) {
                monthHeaders += `<div class="bg-pink-200 text-pink-800 font-bold p-3 rounded-xl flex items-center justify-center text-lg shadow-inner whitespace-nowrap">🌸 ${i}月</div>`;
            }

            el('view-container').innerHTML = `
                <div class="w-full h-full flex flex-col p-4 md:p-8 overflow-y-auto animate-fade-in relative z-10 custom-scrollbar">
                    <div class="max-w-[1600px] mx-auto w-full flex-1 flex flex-col">
                        
                        <!-- 標題與導覽區塊 -->
                        <div class="relative mb-8 bg-white/80 rounded-3xl p-6 shadow-sm border-2 border-pink-100 flex flex-col xl:flex-row items-center justify-between w-full gap-4">
                            <div class="flex flex-col md:flex-row items-center gap-4">
                                <img src="images/logo.jpg" alt="公司 Logo" class="h-16 md:h-20 w-auto rounded-xl shadow-sm object-contain" onerror="this.onerror=null; this.src='data:image/svg+xml;charset=UTF-8,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22100%22 height=%2260%22 viewBox=%220 0 100 60%22%3E%3Crect width=%22100%22 height=%2260%22 rx=%2210%22 fill=%22%23fbcfe8%22/%3E%3Ctext x=%2250%22 y=%2235%22 font-family=%22sans-serif%22 font-weight=%22bold%22 font-size=%2216%22 text-anchor=%22middle%22 fill=%22%23be185d%22%3ELOGO%3C/text%3E%3C/svg%3E';">
                                <div class="text-center xl:text-left">
                                    <h1 class="text-3xl md:text-4xl font-bold text-pink-500 drop-shadow-sm">
                                        💖 2026年 各分店營收總表 💖
                                    </h1>
                                    <p class="text-pink-400 mt-2 font-semibold">點擊各月份格子來填寫週結帳紀錄 ✍️</p>
                                </div>
                            </div>
                            
                            <!-- 帳號與連線狀態 -->
                            <div class="flex flex-col items-center xl:items-end gap-3 mt-2 xl:mt-0 bg-pink-50 p-4 rounded-2xl border border-pink-100 shadow-inner">
                                <div class="flex items-center text-sm font-bold text-pink-700 bg-white px-3 py-1.5 rounded-full border border-pink-200">
                                    <span class="status-dot ${connectionStatus === 'loading' ? 'bg-amber-400 animate-pulse' : connectionStatus === 'success' ? 'bg-emerald-400' : 'bg-rose-500'}"></span>
                                    <span>${connectionStatus === 'loading' ? '雲端讀取中...' : connectionStatus === 'success' ? '資料已自動同步' : '離線模式'}</span>
                                </div>
                                <div class="flex items-center gap-3">
                                    <span class="font-bold text-purple-700 text-lg">👤 ${username}</span>
                                    <button onclick="logout()" class="text-rose-500 hover:text-white bg-white hover:bg-rose-400 px-3 py-1.5 rounded-lg border border-rose-200 shadow-sm transition-all font-bold text-sm flex items-center"><span class="mr-1">🚪</span>登出</button>
                                </div>
                            </div>
                        </div>

                        <!-- 主要年度營收總表 -->
                        <div class="glass-panel rounded-3xl shadow-xl overflow-hidden mb-8">
                            <div class="overflow-x-auto custom-scrollbar p-4">
                                <div class="min-w-[1250px]" style="display: grid; grid-template-columns: 120px repeat(12, minmax(85px, 1fr)) 120px; gap: 4px;">
                                    
                                    <!-- 標頭列 -->
                                    <div class="bg-pink-300 text-white font-bold p-3 rounded-xl flex items-center justify-center text-lg shadow-inner whitespace-nowrap">🏪 分店</div>
                                    ${monthHeaders}
                                    <div class="bg-purple-300 text-white font-bold p-3 rounded-xl flex items-center justify-center text-lg shadow-inner whitespace-nowrap">💰 合計</div>

                                    <!-- 資料列將由 JS 動態產生 -->
                                    <div id="grid-body" class="col-span-full" style="display: grid; grid-template-columns: subgrid; gap: 4px;"></div>

                                    <!-- 底部總計列 -->
                                    <div class="bg-pink-400 text-white font-bold p-3 rounded-xl flex items-center justify-center text-lg mt-2 shadow-md whitespace-nowrap">📊 總計</div>
                                    <div id="monthly-totals" class="col-span-12" style="display: grid; grid-template-columns: repeat(12, 1fr); gap: 4px; margin-top: 8px;"></div>
                                    <div id="grand-total" class="bg-purple-500 text-white font-bold p-3 rounded-xl flex items-center justify-center text-xl mt-2 shadow-md whitespace-nowrap">0</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 彈出式視窗 (週營收紀錄表) -->
                <div id="modal" class="fixed inset-0 bg-pink-900/40 backdrop-blur-sm hidden items-center justify-center z-50 p-4 transition-opacity duration-300">
                    <div class="bg-white rounded-[2rem] shadow-2xl w-full max-w-5xl overflow-hidden border-4 border-pink-200 transform transition-all scale-95 flex flex-col max-h-[90vh]" id="modal-content">
                        
                        <!-- 視窗標頭 -->
                        <div class="bg-gradient-to-r from-pink-300 via-purple-300 to-indigo-300 p-5 flex justify-between items-center shrink-0">
                            <h2 class="text-2xl font-bold text-white drop-shadow-md flex items-center gap-2">
                                <span>🏬</span>
                                <span id="modal-title"></span>
                            </h2>
                            <button onclick="closeModal()" class="text-white hover:text-pink-100 bg-white/20 hover:bg-white/40 rounded-full w-10 h-10 flex items-center justify-center transition-colors text-xl">
                                ❌
                            </button>
                        </div>

                        <!-- 視窗內容 (週結帳表單) -->
                        <div class="p-6 bg-pink-50/50 flex-1 overflow-y-auto custom-scrollbar">
                            <div class="overflow-x-auto custom-scrollbar pb-4">
                                <!-- 表單 Grid 標頭 -->
                                <div class="min-w-[900px]">
                                    <div class="grid grid-cols-[60px_140px_1fr_1fr_1fr_1fr_120px_120px_120px] gap-2 mb-3 bg-pink-100 p-3 rounded-2xl font-bold text-pink-800 text-center items-center shadow-sm">
                                        <div>序號</div>
                                        <div>📅 日期</div>
                                        <div>💵 紙鈔</div>
                                        <div>🪙 零錢</div>
                                        <div>💳 信用卡</div>
                                        <div>📱 Line Pay</div>
                                        <div class="text-purple-700">🧾 實際營收小計</div>
                                        <div class="text-blue-700">📝 結帳單金額</div>
                                        <div>⚖️ 正負差額</div>
                                    </div>

                                    <!-- 6行輸入列 -->
                                    <div id="modal-rows" class="space-y-2"></div>

                                    <!-- 總計列 -->
                                    <div class="grid grid-cols-[60px_140px_1fr_1fr_1fr_1fr_120px_120px_120px] gap-2 mt-4 bg-pink-200/80 p-3 rounded-2xl font-bold text-lg items-center text-center shadow-md border-2 border-pink-300">
                                        <div class="col-span-6 text-right pr-4 text-pink-900">✨ 營收合計 ✨</div>
                                        <div id="modal-total-actual" class="text-purple-800 bg-white/60 rounded-lg p-1">0</div>
                                        <div class="text-right pr-4 text-pink-900">差額合計</div>
                                        <div id="modal-total-diff" class="bg-white/60 rounded-lg p-1">0</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        <!-- 按鈕區 -->
                        <div class="p-6 bg-white border-t border-pink-100 flex justify-end gap-4 shrink-0">
                            <button onclick="closeModal()" class="px-6 py-3 rounded-xl font-bold text-pink-500 bg-pink-50 border border-pink-200 hover:bg-pink-100 transition-colors">
                                稍後再填 🏃
                            </button>
                            <button onclick="saveModalData()" class="px-8 py-3 rounded-xl font-bold text-white bg-gradient-to-r from-pink-400 to-purple-400 hover:from-pink-500 hover:to-purple-500 shadow-lg transform hover:scale-105 transition-all flex items-center gap-2">
                                <span>💾</span> 儲存並同步至雲端
                            </button>
                        </div>
                    </div>
                </div>
            `;
            renderMainGrid();
        };

        // ==========================================
        //  App Logic & Maths
        // ==========================================
        window.formatMoney = (num) => {
            return Number(num).toLocaleString('zh-TW');
        };

        window.getMonthTotalForBranch = (branch, month) => {
            if (!appData[branch] || !appData[branch][month]) return 0;
            let total = 0;
            appData[branch][month].forEach(row => {
                const sub = (Number(row.notes) || 0) + (Number(row.coins) || 0) + 
                            (Number(row.cc) || 0) + (Number(row.line) || 0);
                total += sub;
            });
            return total;
        };

        window.renderMainGrid = () => {
            const gridBody = document.getElementById('grid-body');
            const monthlyTotalsContainer = document.getElementById('monthly-totals');
            if(!gridBody || !monthlyTotalsContainer) return; // Prevent error if off-screen
            
            gridBody.innerHTML = '';
            monthlyTotalsContainer.innerHTML = '';

            let grandTotal = 0;
            let monthlyTotals = new Array(12).fill(0);

            branches.forEach(branch => {
                let branchYearTotal = 0;
                gridBody.innerHTML += `<div class="bg-white font-bold p-3 rounded-xl flex items-center justify-center text-pink-700 shadow-sm border border-pink-100 whitespace-nowrap">${branch}</div>`;

                for (let m = 1; m <= 12; m++) {
                    const monthVal = getMonthTotalForBranch(branch, m);
                    branchYearTotal += monthVal;
                    monthlyTotals[m-1] += monthVal;

                    gridBody.innerHTML += `
                        <div onclick="openModal('${branch}', ${m})" 
                             class="bg-white p-3 rounded-xl flex items-center justify-end text-gray-600 shadow-sm border border-transparent hover:border-pink-400 hover:shadow-md cursor-pointer transition-all hover:-translate-y-1 group relative whitespace-nowrap">
                            ${monthVal > 0 ? `<span class="font-bold text-pink-900">${formatMoney(monthVal)}</span>` : '<span class="text-pink-100">-</span>'}
                            <div class="absolute inset-0 bg-pink-100/50 opacity-0 group-hover:opacity-100 rounded-xl transition-opacity pointer-events-none"></div>
                        </div>
                    `;
                }
                gridBody.innerHTML += `<div class="bg-purple-50 font-bold p-3 rounded-xl flex items-center justify-end text-purple-700 shadow-sm border border-purple-100 whitespace-nowrap">${formatMoney(branchYearTotal)}</div>`;
                grandTotal += branchYearTotal;
            });

            monthlyTotals.forEach(total => {
                monthlyTotalsContainer.innerHTML += `<div class="bg-pink-100 font-bold p-3 rounded-xl flex items-center justify-end text-pink-800 shadow-sm border border-pink-200 whitespace-nowrap">${formatMoney(total)}</div>`;
            });

            document.getElementById('grand-total').innerText = formatMoney(grandTotal);
        };

        window.createNumberInput = (className, value, placeholder) => {
            return `
                <div>
                    <input type="number" placeholder="${placeholder}" class="${className} w-full p-2 rounded-xl border border-pink-200 focus:border-pink-500 focus:ring-2 focus:ring-pink-200 outline-none text-right shadow-inner text-gray-700 transition-all placeholder:text-gray-300 font-bold" value="${value || ''}" oninput="calculateModalTotals()">
                </div>
            `;
        };

        window.openModal = (branch, month) => {
            currentBranch = branch;
            currentMonth = month;
            
            document.getElementById('modal-title').innerText = `${branch} - ${month}月 營收紀錄表`;
            const modalRows = document.getElementById('modal-rows');
            modalRows.innerHTML = '';

            let monthData = (appData[branch] && appData[branch][month]) ? appData[branch][month] : [];
            
            for (let i = 0; i < 6; i++) {
                const row = monthData[i] || { date: '', notes: '', coins: '', cc: '', line: '', receipt: '' };
                modalRows.innerHTML += `
                    <div class="grid grid-cols-[60px_140px_1fr_1fr_1fr_1fr_120px_120px_120px] gap-2 items-center row-entry group hover:bg-pink-50 p-1 rounded-xl transition-colors">
                        <div class="text-center font-bold text-pink-400 bg-white rounded-lg py-2 shadow-sm border border-pink-100">${i + 1}</div>
                        <div>
                            <input type="date" class="row-date w-full p-2 rounded-xl border border-pink-200 focus:border-pink-500 focus:ring-2 focus:ring-pink-200 outline-none text-sm text-gray-600 shadow-inner" value="${row.date}">
                        </div>
                        ${createNumberInput('row-notes', row.notes, '紙鈔')}
                        ${createNumberInput('row-coins', row.coins, '零錢')}
                        ${createNumberInput('row-cc', row.cc, '信用卡')}
                        ${createNumberInput('row-line', row.line, 'LinePay')}
                        <div class="row-subtotal text-right font-bold text-purple-600 bg-purple-50 p-2 rounded-xl shadow-inner border border-purple-100">0</div>
                        ${createNumberInput('row-receipt', row.receipt, '結帳單')}
                        <div class="row-diff text-right font-bold p-2 rounded-xl shadow-inner border border-gray-100 bg-gray-50">0</div>
                    </div>
                `;
            }

            const modal = document.getElementById('modal');
            const modalContent = document.getElementById('modal-content');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            setTimeout(() => {
                modalContent.classList.remove('scale-95');
                modalContent.classList.add('scale-100');
            }, 10);

            calculateModalTotals();
        };

        window.closeModal = () => {
            const modal = document.getElementById('modal');
            const modalContent = document.getElementById('modal-content');
            modalContent.classList.remove('scale-100');
            modalContent.classList.add('scale-95');
            setTimeout(() => {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
            }, 200);
        };

        window.calculateModalTotals = () => {
            let totalActual = 0;
            let totalDiff = 0;

            const rows = document.querySelectorAll('.row-entry');
            rows.forEach(row => {
                const notes = Number(row.querySelector('.row-notes').value) || 0;
                const coins = Number(row.querySelector('.row-coins').value) || 0;
                const cc = Number(row.querySelector('.row-cc').value) || 0;
                const line = Number(row.querySelector('.row-line').value) || 0;
                const receipt = Number(row.querySelector('.row-receipt').value) || 0;

                const subtotal = notes + coins + cc + line;
                row.querySelector('.row-subtotal').innerText = formatMoney(subtotal);

                let diff = 0;
                let diffElement = row.querySelector('.row-diff');
                
                if (subtotal !== 0 || row.querySelector('.row-receipt').value !== '') {
                    diff = subtotal - receipt;
                    diffElement.innerText = formatMoney(diff);
                    if (diff < 0) {
                        diffElement.className = 'row-diff text-right font-bold p-2 rounded-xl shadow-inner border border-red-200 bg-red-50 text-red-500';
                    } else if (diff > 0) {
                        diffElement.className = 'row-diff text-right font-bold p-2 rounded-xl shadow-inner border border-green-200 bg-green-50 text-green-600';
                    } else {
                         diffElement.className = 'row-diff text-right font-bold p-2 rounded-xl shadow-inner border border-gray-100 bg-gray-50 text-gray-700';
                    }
                } else {
                    diffElement.innerText = '';
                    diffElement.className = 'row-diff text-right font-bold p-2 rounded-xl shadow-inner border border-gray-100 bg-gray-50';
                }

                totalActual += subtotal;
                totalDiff += diff;
            });

            document.getElementById('modal-total-actual').innerText = formatMoney(totalActual);
            const totalDiffEl = document.getElementById('modal-total-diff');
            totalDiffEl.innerText = formatMoney(totalDiff);
            if (totalDiff < 0) {
                totalDiffEl.className = 'bg-white/90 rounded-lg p-1 text-red-600 border border-red-300';
            } else if (totalDiff > 0) {
                totalDiffEl.className = 'bg-white/90 rounded-lg p-1 text-green-600 border border-green-300';
            } else {
                totalDiffEl.className = 'bg-white/60 rounded-lg p-1 text-gray-700';
            }
        };

        window.saveModalData = () => {
            if (!appData[currentBranch]) appData[currentBranch] = {};
            
            const monthData = [];
            const rows = document.querySelectorAll('.row-entry');
            rows.forEach(row => {
                monthData.push({
                    date: row.querySelector('.row-date').value,
                    notes: row.querySelector('.row-notes').value,
                    coins: row.querySelector('.row-coins').value,
                    cc: row.querySelector('.row-cc').value,
                    line: row.querySelector('.row-line').value,
                    receipt: row.querySelector('.row-receipt').value,
                });
            });

            appData[currentBranch][currentMonth] = monthData;
            
            // 觸發雲端儲存
            saveUserDataToCloud();
            
            closeModal();
            renderMainGrid();
        };

        // Modal 點擊背景關閉事件綁定
        document.addEventListener('click', function(e) {
            const modal = document.getElementById('modal');
            if (modal && !modal.classList.contains('hidden') && e.target === modal) {
                closeModal();
            }
        });

        // Initialize App
        initApp();

    </script>
</body>
</html>
